# Alembic config. The actual SQLAlchemy URL and target metadata are wired up
# in alembic/env.py so they stay in sync with app.config + app.models.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
# sqlalchemy.url is set programmatically in env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
