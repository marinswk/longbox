{% if creators_sections %}
<div class="panel rounded-3xl p-6">
  <h3 class="font-display text-2xl tracking-wide">CREATORS</h3>
  <dl class="mt-3 grid grid-cols-[auto_1fr] gap-x-4 gap-y-1 text-sm">
    {% for role, names in creators_sections %}
      <dt class="font-semibold capitalize">{{ role }}</dt>
      <dd>{{ names|join(', ') }}</dd>
    {% endfor %}
  </dl>
</div>
{% endif %}
