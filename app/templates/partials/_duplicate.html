<div class="panel rounded-3xl p-6">
  <h3 class="font-display text-2xl tracking-wide text-crawl-dark">YOU ALREADY OWN THIS</h3>
  <p class="mt-2 text-sm">
    <span class="font-semibold">{{ comic.title or '(untitled)' }}</span>
    {% if comic.issue_number %} #{{ comic.issue_number }}{% endif %}
    is already in your collection — you currently own
    <strong>{{ copies }}</strong> cop{{ 'y' if copies == 1 else 'ies' }}.
  </p>

  <form class="mt-6 grid grid-cols-1 gap-3 sm:grid-cols-[1fr_auto]"
        hx-post="/add/save" hx-target="#flow" hx-swap="innerHTML">
    <input type="hidden" name="existing_comic_id" value="{{ comic.id }}" />
    {% for k, v in fields.items() %}
      <input type="hidden" name="{{ k }}" value="{{ v if v is not none else '' }}" />
    {% endfor %}
    <label class="flex items-center gap-3">
      <span class="text-sm font-semibold">Price paid (EUR)</span>
      <input type="number" step="0.01" min="0" name="price_paid_eur" placeholder="optional"
             class="w-40 rounded-lg border-4 border-black px-3 py-2 font-mono focus:outline-none focus:ring-4 focus:ring-crawl-light" />
    </label>
    <button type="submit"
            class="rounded-lg border-4 border-black bg-crawl px-6 py-2 font-semibold text-black shadow-[4px_4px_0_0_#000] transition hover:-translate-y-0.5">
      Add another copy
    </button>
  </form>
</div>
