<div class="panel rounded-3xl p-6">
  <div class="flex items-baseline justify-between gap-3">
    <h3 class="font-display text-2xl tracking-wide">TAGS</h3>
    <div class="flex items-center gap-2">
      <button type="button"
              hx-post="/comic/{{ comic_id }}/auto-tag"
              hx-target="#tags-section" hx-swap="innerHTML"
              title="Re-pull characters / arcs / concepts from the original source and add them as tags"
              class="rounded-md border-2 border-black bg-white px-2 py-1 text-[11px] font-semibold shadow-[2px_2px_0_0_#000] hover:bg-crawl-light/70">
        ✨ Auto-tag
      </button>
      <p class="text-sm text-gray-600">{{ tags|length }} tagged</p>
    </div>
  </div>

  {% if flash %}
  <p class="mt-3 rounded-lg border-2 border-black bg-crawl-light/40 px-3 py-2 text-xs">
    {{ flash }}
  </p>
  {% endif %}

  <ul class="mt-3 flex flex-wrap gap-2">
    {% for t in tags %}
    <li>
      <span class="inline-flex items-center gap-1 rounded-full border-2 border-black bg-crawl-light/30 px-3 py-1 text-xs font-semibold shadow-[2px_2px_0_0_#000]">
        <a href="/library?tag={{ t.name | urlencode }}" class="hover:underline" title="Browse comics tagged {{ t.name }}">{{ t.name }}</a>
        <form class="inline-flex"
              hx-post="/comic/{{ comic_id }}/tags/remove"
              hx-target="#tags-section" hx-swap="innerHTML">
          <input type="hidden" name="tag_id" value="{{ t.id }}" />
          <button type="submit" title="Remove tag" class="ml-1 leading-none text-gray-700 hover:text-red-700">×</button>
        </form>
      </span>
    </li>
    {% else %}
    <li class="text-sm text-gray-500">No tags yet — add some below.</li>
    {% endfor %}
  </ul>

  <form class="mt-4 flex gap-2"
        hx-post="/comic/{{ comic_id }}/tags"
        hx-target="#tags-section" hx-swap="innerHTML"
        hx-on::after-request="this.reset()">
    <input type="text" name="name" required maxlength="40" placeholder="add a tag…"
           class="flex-1 rounded-lg border-2 border-black px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-crawl" />
    <button type="submit"
            class="rounded-lg border-2 border-black bg-crawl px-4 py-1.5 text-sm font-semibold text-black shadow-[2px_2px_0_0_#000]">
      Add
    </button>
  </form>
</div>
