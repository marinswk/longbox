{# Freeform "search again with my own text" input. Submits to /search-custom
   which re-runs the aggregator with the typed query bypassing the
   CSV-derived series/title/ISBN derivation. #}
<form hx-post="/admin/import/csv/{{ session.token }}/rows/{{ row.id }}/search-custom"
      hx-target="#lb-row-{{ row.id }}" hx-swap="outerHTML"
      class="mt-3 flex items-center gap-2">
  <input type="text" name="q" maxlength="120"
         placeholder="Search again — try a different title, series, or wikipedia article…"
         class="min-w-0 flex-1 rounded-md border-2 border-black bg-white px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-crawl" />
  <button type="submit"
          class="rounded border-2 border-black bg-crawl px-3 py-1 text-[11px] font-semibold text-black shadow-[2px_2px_0_0_#000] hover:-translate-y-0.5">
    🔎 search
  </button>
</form>
